<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>入退場受付</title>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #444; margin-bottom: 20px; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; background-color: white; }
    
    .no-input { background-color: #fffde7; border: 2px solid #fbc02d; font-weight: bold; text-align: center; letter-spacing: 2px; font-size: 20px; appearance: auto; cursor: pointer; }

    button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; }
    .btn-entry { background-color: #007bff; color: white; }
    .btn-exit { background-color: #dc3545; color: white; padding: 25px; font-size: 22px; }
    .hidden { display: none !important; }
    #loader { text-align: center; padding: 20px; }
    #error-display { color: red; text-align: center; margin-top: 20px; font-weight: bold; font-size: 14px; display: none; }
    .note { font-size: 0.9em; color: #666; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 4px; }
    .mode-switch { text-align: center; margin-top: 20px; font-size: 14px; }
    .mode-switch a { color: #007bff; text-decoration: none; border-bottom: 1px dashed #007bff; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.2s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-box { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transform: scale(0.9); transition: transform 0.2s; }
    .modal-overlay.active .modal-box { transform: scale(1); }
    .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #333; }
    .modal-msg { font-size: 16px; margin-bottom: 25px; color: #555; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-modal { padding: 12px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 48%; margin-top: 0; }
    .btn-cancel { background: #e0e0e0; color: #333; }
    .btn-confirm { background: #dc3545; color: white; box-shadow: 0 4px 6px rgba(220,53,69,0.3); }

    .color-1 { color: #28a745; } 
    .color-2 { color: #ffc107; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); } 
    .color-3 { color: #007bff; } 
  </style>
</head>
<body>
  <div class="container">
    <div id="loader">
      <p>読み込み中...</p>
      <div id="error-display"></div>
    </div>

    <div id="entrySection" class="hidden">
      <h2>👋 入門受付</h2>
      <p class="note">必要事項を入力し、守衛室で入構証を受け取ってください。</p>
      <form id="entryForm">
        <label>会社名</label>
        <input type="text" name="company" placeholder="例：〇〇運送" required>
        
        <label>氏名</label>
        <input type="text" name="name" placeholder="例：配送 太郎" required>
        
        <label>他〇〇名（同行者）</label>
        <select name="companion">
          <option value="0" selected>0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
        
        <label>電話番号</label>
        <input type="tel" name="tel" placeholder="09012345678" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
        
        <label>用件</label>
        <select name="purpose">
          <option value="納品・集荷">納品・集荷</option>
          <option value="工事・作業">工事・作業</option>
          <option value="打ち合わせ">打ち合わせ</option>
          <option value="その他">その他</option>
        </select>

        <label>面会先</label>
        <select name="contact" required>
          <option value="" disabled selected>選択してください</option>
          <option value="（株）上組">１．（株）上組</option>
          <option value="五島海運（株）">２．五島海運（株）</option>
          <option value="アース電機（株）">３．アース電機（株）</option>
          <option value="タカノ（株）">４．タカノ（株）</option>
          <option value="カーレポ（株）">５．カーレポ（株）</option>
          <option value="メルセデス・ベンツ日本（同）">６．メルセデス・ベンツ日本（同）</option>
          <option value="エムビー・サービス日本（株）">７．エムビー・サービス日本（株）</option>
          <option value="Stellantisジャパン（株）">８．Stellantisジャパン（株）</option>
          <option value="その他">９．その他</option>
        </select>

        <button type="button" class="btn-entry" onclick="submitEntry()">入門登録</button>
      </form>
      <div class="mode-switch"><a href="#" onclick="showExitSearch(); return false;">退出の方はこちら (No選択)</a></div>
    </div>

    <div id="exitSearchSection" class="hidden">
      <h2>🏁 出門申請</h2>
      <p class="note">手元の入構証番号を選択してください。</p>
      <label>入構証No.</label>
      <select id="searchNo" class="no-input">
        <option value="" disabled selected>番号を選択</option>
      </select>
      <button type="button" class="btn-exit" onclick="manualSearch()">確認する</button>
      <div class="mode-switch"><a href="#" onclick="showEntry(); return false;">← 入門受付に戻る</a></div>
    </div>

    <div id="exitSection" class="hidden" style="text-align:center;">
      <h2>🏁 出門申請</h2>
      <div style="margin: 20px 0;">
        <p>以下の番号で申請します</p>
        <h1 style="font-size: 48px; margin: 10px 0;">No.<span id="exitNoDisplay"></span></h1>
      </div>
      <button type="button" class="btn-exit" onclick="submitExit()">出門申請をする</button>
      <p style="font-size:12px; color:#666;">※入構証を守衛所へ返却してください</p>
    </div>

    <div id="completeSection" class="hidden" style="text-align:center;">
      <h2 style="color:#28a745;">✅ 送信完了</h2>
      <p id="completeMsg">守衛室で入構証を受け取ってください。</p>
      <br>
    </div>
  </div>

  <div id="customModal" class="modal-overlay">
    <div class="modal-box">
      <div id="modalTitle" class="modal-title">確認</div>
      <div id="modalMsg" class="modal-msg">メッセージ</div>
      <div class="modal-actions">
        <button class="btn-modal btn-cancel" onclick="closeModal()">キャンセル</button>
        <button id="modalConfirmBtn" class="btn-modal btn-confirm">実行</button>
      </div>
    </div>
  </div>

  <script>
    // =========================================================
    // ★重要: ここにGAS（バックエンドAPI）のURLを貼り付けてください
    // =========================================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwQaHqPU3mHTRfGO_Q4N1WevIgOHLW90R5hR9kM7hOAfXdzEg6Qru3rb4LQmmxg2bsf0g/exec";

    let initialMode = "entry";
    let initialNo = "";
    
    // GASと通信するための共通関数 (CORS回避のため text/plain で送信)
    async function callGAS(payload) {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error("ネットワークエラーが発生しました");
      return await response.json();
    }

    const noOptionsList = [];
    for(let i = 800; i <= 830; i++) noOptionsList.push(String(i));
    for(let i = 900; i <= 930; i++) noOptionsList.push(String(i));
    for(let i = 1000; i <= 1030; i++) noOptionsList.push(String(i));
    
    window.onload = async function() {
      const searchNoEl = document.getElementById('searchNo');
      if(searchNoEl) {
        noOptionsList.forEach(opt => {
          const option = document.createElement("option");
          option.value = opt;
          option.text = opt;
          searchNoEl.appendChild(option);
        });
      }

      try {
        // URLのパラメータから情報を取得する
        const urlParams = new URLSearchParams(window.location.search);
        initialMode = urlParams.get('mode') || "entry";
        initialNo = urlParams.get('no') || "";

        if (initialMode === "exit" && initialNo) {
          window.currentNo = initialNo;
          document.getElementById('loader').innerHTML = "<p>No." + initialNo + " を確認中...</p><div id='error-display'></div>";
          
          // GASのAPIを呼び出してステータスを確認
          try {
            const result = await callGAS({ action: 'checkStatus', no: initialNo });
            handleQrScanResult(result);
          } catch (error) {
            handleError(error);
          }
          return;
        }

        document.getElementById('loader').classList.add('hidden');
        if (initialMode === "exit") {
          showExitSearch();
        } else {
          showEntry();
        }

      } catch (e) {
        showError("起動エラー: " + e.message);
      }
    };

    function showError(msg) {
      const errDiv = document.getElementById('error-display');
      if(errDiv) {
        errDiv.innerHTML = msg;
        errDiv.style.display = 'block';
      }
    }

    function setNoColor(noStr) {
      const displayEl = document.getElementById('exitNoDisplay');
      displayEl.innerText = noStr;
      displayEl.className = "";
      
      const num = parseInt(noStr, 10);
      if (num >= 800 && num <= 830) {
        displayEl.classList.add("color-1");
      } else if (num >= 900 && num <= 930) {
        displayEl.classList.add("color-2");
      } else if (num >= 1000 && num <= 1030) {
        displayEl.classList.add("color-3");
      }
    }

    function handleQrScanResult(result) {
      document.getElementById('loader').classList.add('hidden');
      if (result.status === "INSIDE") {
        setNoColor(window.currentNo);
        document.getElementById('exitSection').classList.remove('hidden');
      } else {
        showModal("エラー", "No." + window.currentNo + " が見つかりません。<br><span style='font-size:0.8em'>未受付または退場済みです。</span>", () => showEntry());
        document.getElementById('modalConfirmBtn').innerText = "OK";
        document.querySelector('.btn-cancel').style.display = 'none';
      }
    }

    function handleError(e) {
      alert("【エラー原因】\n" + e.message); 
      document.getElementById('loader').classList.add('hidden');
      showError("システムエラー: " + e.message);
    }

    function showEntry() {
      document.getElementById('exitSearchSection').classList.add('hidden');
      document.getElementById('exitSection').classList.add('hidden');
      document.getElementById('entrySection').classList.remove('hidden');
    }

    function showExitSearch() {
      document.getElementById('entrySection').classList.add('hidden');
      document.getElementById('exitSection').classList.add('hidden');
      document.getElementById('exitSearchSection').classList.remove('hidden');
    }

    async function manualSearch() {
      const inputNo = document.getElementById('searchNo').value;
      if(!inputNo) { 
        showModal("入力エラー", "番号を選択してください", () => closeModal());
        document.getElementById('modalConfirmBtn').innerText = "OK";
        document.querySelector('.btn-cancel').style.display = 'none';
        return; 
      }
      window.currentNo = inputNo;
      document.getElementById('exitSearchSection').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      
      try {
        const result = await callGAS({ action: 'checkStatus', no: inputNo });
        document.getElementById('loader').classList.add('hidden');
        if (result.status === "INSIDE") {
          setNoColor(window.currentNo);
          document.getElementById('exitSection').classList.remove('hidden');
        } else {
          showModal("見つかりません", "該当データがありません。", () => showExitSearch());
          document.getElementById('modalConfirmBtn').innerText = "OK";
          document.querySelector('.btn-cancel').style.display = 'none';
        }
      } catch (error) {
        handleError(error);
      }
    }

    async function submitEntry() {
      const form = document.getElementById('entryForm');
      
      if (!form.company.value || !form.name.value || !form.contact.value) {
        showModal("入力エラー", "会社名、氏名、面会先は必須です", () => closeModal());
        document.getElementById('modalConfirmBtn').innerText = "OK";
        document.querySelector('.btn-cancel').style.display = 'none';
        return;
      }
      
      document.getElementById('entrySection').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      document.getElementById('loader').innerHTML = '<p>登録中...</p><div id="error-display"></div>';
      
      const formData = { 
        no: "", 
        company: form.company.value, 
        name: form.name.value, 
        companion: form.companion.value, 
        tel: form.tel.value, 
        purpose: form.purpose.value,
        contact: form.contact.value 
      };
      
      try {
        const result = await callGAS({ action: 'entry', formData: formData });
        document.getElementById('loader').classList.add('hidden');
        if (result.status === "SUCCESS") {
          document.getElementById('completeMsg').innerHTML = "受付しました。<br><strong>守衛室で入構証を受け取ってください。</strong>";
          document.getElementById('completeSection').classList.remove('hidden');
        } else {
          throw new Error(result.message || "登録処理に失敗しました");
        }
      } catch (error) {
        handleError(error);
      }
    }

    function submitExit() {
      showModal("出門申請", `No.${window.currentNo} の出門申請を<br>送信しますか？`, async function() {
        document.getElementById('exitSection').classList.add('hidden');
        document.getElementById('loader').classList.remove('hidden');
        
        try {
          const result = await callGAS({ action: 'exit', no: window.currentNo });
          document.getElementById('loader').classList.add('hidden');
          if (result.status === "SUCCESS") {
            document.getElementById('completeMsg').innerText = "出門申請を完了しました。";
            document.getElementById('completeSection').classList.remove('hidden');
          } else {
            throw new Error(result.message || "出門処理に失敗しました");
          }
        } catch (error) {
          handleError(error);
        }
      });
    }

    function showModal(title, msg, onConfirm) {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMsg').innerHTML = msg;
      const confirmBtn = document.getElementById('modalConfirmBtn');
      const cancelBtn = document.querySelector('.btn-cancel');
      confirmBtn.innerText = "実行";
      cancelBtn.style.display = "inline-block";
      confirmBtn.onclick = function() { closeModal(); if (onConfirm) onConfirm(); };
      document.getElementById('customModal').classList.add('active');
    }
    function closeModal() { document.getElementById('customModal').classList.remove('active'); }
  </script>
</body>
</html>
